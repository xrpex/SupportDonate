name: Deploy Donation Page

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Paystack Key
        env:
          PAYSTACK_KEY: ${{ secrets.PAYSTACK_PUBLIC_KEY }}
        run: |
          sed -i "s|YOUR_PAYSTACK_PUBLIC_KEY_HERE|${PAYSTACK_KEY}|g" index.html
          echo "✅ Paystack key injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
